name: Security

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies and audit tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install -r requirements-dev.lock.txt
          pip install pip-audit==2.7.3

      - name: Run vulnerability audit
        run: |
          pip-audit -r requirements.lock.txt
          pip-audit -r requirements-dev.lock.txt

  static-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit==1.7.9

      - name: Run Bandit (high confidence findings)
        run: bandit -r core ui util win main.py -lll
